{% extends "base.html" %}
 
{% block title %}Delete Task{% endblock %}
 
{% block content %}
<div class="form-page">
<h1>Delete Task</h1>
<p>Are you sure you want to delete <strong>"{{ task.title }}"</strong>?</p>
<p>This cannot be undone.</p>
 
        <form method="post">
            {% csrf_token %}
<div class="form-buttons">
<button type="submit" class="btn btn-danger">Yes, delete it</button>
<a href="{% url 'task_detail' task.pk %}" class="btn">Cancel</a>
</div>
</form>
</div>
{% endblock %}
