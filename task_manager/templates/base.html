<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Task Manager{% endblock %}</title>
    {% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
 
    <!-- Navigation bar — shows on every page -->
<nav class="navbar">
<a href="{% url 'task_list' %}" class="nav-brand">Task Manager</a>
<div class="nav-links">
            {% if user.is_authenticated %}
<span>Hello, {{ user.username }}</span>
<a href="{% url 'task_create' %}">+ New Task</a>
<a href="{% url 'task_list' %}?status=open">Open</a>
<a href="{% url 'task_list' %}?status=done">Done</a>
<a href="{% url 'logout' %}">Logout</a>
            {% else %}
<a href="{% url 'login' %}">Login</a>
            {% endif %}
</div>
</nav>
 
    <!-- Main content — each page fills this block -->
<main class="container">
        {% block content %}
        {% endblock %}
</main>
 
</body>
</html>
